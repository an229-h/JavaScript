<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Parking Lot Manager</title>

<style>
    *{
        box-sizing:border-box;
    }

    body{
        font-family:Arial, sans-serif;
        background:#f4f6f9;
        max-width:800px;
        margin:auto;
        padding:15px;
    }

    h1{
        text-align:center;
        margin-bottom:20px;
    }

    .row{
        display:flex;
        gap:8px;
        margin-bottom:10px;
    }

    input{
        flex:1;
        padding:8px;
        border:1px solid #ccc;
        border-radius:5px;
    }

    button{
        padding:8px 14px;
        border:none;
        border-radius:5px;
        background:#0078ff;
        color:white;
        cursor:pointer;
        white-space:nowrap;
    }

    button:hover{
        background:#005fd1;
    }

    .utilities{
        display:flex;
        gap:8px;
        margin-top:10px;
        margin-bottom:15px;
    }

    #output{
        background:white;
        border:1px solid #ddd;
        border-radius:8px;
        padding:15px;
        min-height:180px;
        white-space:pre-wrap;
        font-family:Consolas, monospace;
        overflow:auto;
    }
</style>
</head>

<body>

<h1>Parking Lot Manager</h1>
<div id="output">
   <a href="https://github.com/an229-h/JavaScript">Github repo with commits</a>
   <a href="https://youtube.com/live/YhKsPQVTquo">Youtube Live 29May2026 #1</a>
   <a href=""

</div>

<form class="row"
onsubmit="displayOutput(parkCar(Number(document.getElementById('parkCarNumber').value))); return false;">
    <input type="number" id="parkCarNumber" placeholder="Car Number">
    <button type="submit">Park</button>
</form>

<form class="row"
onsubmit="displayOutput(removeCar(Number(document.getElementById('removeCarNumber').value))); return false;">
    <input type="number" id="removeCarNumber" placeholder="Car Number">
    <button type="submit">Remove</button>
</form>

<form class="row"
onsubmit="displayOutput(searchCar(Number(document.getElementById('searchCarNumber').value))); return false;">
    <input type="number" id="searchCarNumber" placeholder="Car Number">
    <button type="submit">Search</button>
</form>

<form class="row"
onsubmit="displayOutput(relocateCar(
    Number(document.getElementById('relocateCarNumber').value),
    Number(document.getElementById('newSlotNumber').value)
)); return false;">
    <input type="number" id="relocateCarNumber" placeholder="Car Number">
    <input type="number" id="newSlotNumber" placeholder="New Slot">
    <button type="submit">Move</button>
</form>

<div class="utilities">
    <button onclick="displayOutput(getStatus()); alert('check console')">Status</button>
    <button onclick="displayOutput(availableSlots()); alert('check console')">Free Slots</button>
</div>

<div id="output">
Welcome to Parking Lot Manager
</div>

<script>
function displayOutput(text){
    document.getElementById("output").textContent = text;
}
</script>

<script src="script.js"></script>

</body>
</html>
