<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parking Lot Manager</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="parking">

    <header class="parking__header">
        <h1 class="parking__title">Parking Lot Manager</h1>
        <p class="parking__subtitle">
            JavaScript Parking Management System
        </p>
    </header>

    <section class="parking__resources">

        <a class="resource-card"
           href="https://github.com/an229-h/JavaScript"
           target="_blank">
            <span class="resource-card__title">GitHub Repository</span>
            <span class="resource-card__description">
                View source code and commits
            </span>
        </a>

        <a class="resource-card"
           href="https://youtube.com/live/YhKsPQVTquo"
           target="_blank">
            <span class="resource-card__title">Live Session #1</span>
            <span class="resource-card__description">
                Project development stream
            </span>
        </a>

        <a class="resource-card"
           href="https://youtube.com/live/i0lW_jgvhsM?feature=share"
           target="_blank">
            <span class="resource-card__title">Live Session #2</span>
            <span class="resource-card__description">
                Continuation stream
            </span>
        </a>

        <a class="resource-card"
           href="https://youtube.com/live/7Z_EKS_ebJA"
           target="_blank">
            <span class="resource-card__title">Live Session #3</span>
            <span class="resource-card__description">
                Final development session
            </span>
        </a>

    </section>

    <section class="parking__controls">

        <form class="action-form"
              onsubmit="displayOutput(parkCar(Number(document.getElementById('parkCarNumber').value))); return false;">

            <input
                class="action-form__input"
                type="number"
                id="parkCarNumber"
                placeholder="Car Number">

            <button class="action-form__button" type="submit">
                Park Vehicle
            </button>
        </form>

        <form class="action-form"
              onsubmit="displayOutput(removeCar(Number(document.getElementById('removeCarNumber').value))); return false;">

            <input
                class="action-form__input"
                type="number"
                id="removeCarNumber"
                placeholder="Car Number">

            <button class="action-form__button" type="submit">
                Remove Vehicle
            </button>
        </form>

        <form class="action-form"
              onsubmit="displayOutput(searchCar(Number(document.getElementById('searchCarNumber').value))); return false;">

            <input
                class="action-form__input"
                type="number"
                id="searchCarNumber"
                placeholder="Car Number">

            <button class="action-form__button" type="submit">
                Search Vehicle
            </button>
        </form>

        <form class="action-form"
              onsubmit="displayOutput(relocateCar(
              Number(document.getElementById('relocateCarNumber').value),
              Number(document.getElementById('newSlotNumber').value)
              )); return false;">

            <input
                class="action-form__input"
                type="number"
                id="relocateCarNumber"
                placeholder="Car Number">

            <input
                class="action-form__input"
                type="number"
                id="newSlotNumber"
                placeholder="Target Slot">

            <button class="action-form__button" type="submit">
                Relocate
            </button>
        </form>

    </section>

    <section class="parking__quick-actions">

        <button
            class="quick-action quick-action--secondary"
            onclick="displayOutput(getStatus())">
            Parking Status
        </button>

        <button
            class="quick-action quick-action--secondary"
            onclick="displayOutput(availableSlots())">
            Available Slots
        </button>
        <button
        class="quick-action quick-action--danger"
        onclick="location.reload()">
        Reset Parking Lot
    </button>

    </section>

    <section class="parking__output-panel">

        <div class="output-panel__header">
            Output
        </div>

        <div id="output" class="output-panel__body">
Welcome to Parking Lot Manager
        </div>

    </section>
    <div class="parking__footer">
    
</div>

</div>

<script>
function displayOutput(text){
    document.getElementById("output").textContent = text;
}
</script>

<script src="script.js"></script>

<footer><div>
   <a href="mailto:hariom229@hotmail.com">E-mail</a>
   <div><p>Finished 30-May-2026</p></div>
</div></footer>

</body>
</html>
